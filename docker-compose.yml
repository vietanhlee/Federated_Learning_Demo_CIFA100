services:
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    restart: always
    ports:
      - "5000:5000"
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow-server,mlflow-server:5000,localhost,localhost:5000,127.0.0.1,127.0.0.1:5000"
    volumes:
      - mlflow_data:/mlruns
    command: mlflow server --backend-store-uri sqlite:////mlruns/mlflow.db --serve-artifacts --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlruns --host 0.0.0.0 --port 5000
    networks:
      - fl_network

  flower-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: flower_server
    command: ["--rounds", "5", "--server-address", "0.0.0.0:8081", "--mlflow-uri", "http://mlflow-server:5000"]
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
    depends_on:
      - mlflow-server
    networks:
      - fl_network

  client-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: flower_client_1
    command: ["--client-id", "0", "--server-address", "flower-server:8081", "--epochs", "2"]
    volumes:
      - ./data:/app/data
    depends_on:
      - flower-server
    restart: on-failure
    networks:
      - fl_network

  client-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: flower_client_2
    command: ["--client-id", "1", "--server-address", "flower-server:8081", "--epochs", "2"]
    volumes:
      - ./data:/app/data
    depends_on:
      - flower-server
    restart: on-failure
    networks:
      - fl_network

volumes:
  mlflow_data:
  # Mount ./data từ host để tránh việc download lại CIFAR-100 từ mạng nhiều lần

networks:
  fl_network:
    driver: bridge
